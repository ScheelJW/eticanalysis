# Deploy Worker + apply D1 migrations to production (--remote).
#
# Setup (once): GitHub repo → Settings → Secrets and variables → Actions
# → New repository secret → name CLOUDFLARE_API_TOKEN → paste a Cloudflare
# API token with Workers deploy + D1 edit for this account. Never commit tokens.
#
# Run: Actions → "deploy" → Run workflow, or push to main after merge.

name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply etic-snapshots --remote
