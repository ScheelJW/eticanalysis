name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Generates worker-configuration.d.ts from wrangler.jsonc bindings.
      # Runs locally + offline; no Cloudflare auth needed.
      - name: Generate Worker types
        run: npx wrangler types

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test
